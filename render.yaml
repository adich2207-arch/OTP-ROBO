services:
  - type: web
    name: tg-market-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: PORT
        value: "8080"
      - key: TURSO_URL
        sync: false
      - key: TURSO_TOKEN
        sync: false
